<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback SENELEC - IA Générative</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --senelec-blue: #0055A4; --senelec-yellow: #FFD700; --bg: #f4f7f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; border-bottom: 5px solid var(--senelec-yellow); padding-bottom: 20px; margin-bottom: 30px; }
        .header img { height: 50px; margin-bottom: 10px; }
        h1 { color: var(--senelec-blue); font-size: 1.3rem; margin: 0; line-height: 1.2; }
        .badge { display: inline-block; background: #eef6ff; color: var(--senelec-blue); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; margin-top: 10px; }

        fieldset { border: 1px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        legend { font-weight: 700; color: var(--senelec-blue); padding: 0 10px; font-size: 1rem; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }

        .nps-group { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 10px; }
        .nps-item { flex: 1; }
        .nps-item input { display: none; }
        .nps-item label { display: block; text-align: center; padding: 10px 0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; background: #fafafa; }
        .nps-item input:checked + label { background: var(--senelec-blue); color: white; border-color: var(--senelec-blue); }

        button { width: 100%; background: var(--senelec-blue); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #003d7a; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .footer { text-align: center; font-size: 0.75rem; color: #888; margin-top: 20px; }
    </style>
</head>

        <h1>Formation IA Générative : Copilot & Power Automate</h1>
        <div class="badge">📍 CFPP de Mbao — SENELEC</div>
    </div>

    <form id="feedbackSenelec">
        <fieldset>
            <legend>Identification</legend>
            <div style="margin-bottom: 15px;">
                <label for="nom">Nom Complet *</label>
                <input type="text" id="nom" required placeholder="Prénom et Nom">
            </div>
            <div>
                <label for="direction">Direction / Unité *</label>
                <input type="text" id="direction" required placeholder="Ex: DIS, Unité Mbao, DME...">
            </div>
        </fieldset>

        <fieldset>
            <legend>Évaluation de la Session (NPS)</legend>
            <label>Qualité du contenu du cours :</label>
            <div class="nps-group" id="nps_cours"></div>

            <label>Pédagogie et maîtrise des formateurs :</label>
            <div class="nps-group" id="nps_formateur"></div>
            <p style="font-size: 0.7rem; color: #888; text-align: center;">(0 = Très déçu | 10 = Excellent)</p>
        </fieldset>

        <fieldset>
            <legend>Impact & Intérêt</legend>
            <div style="margin-bottom: 15px;">
                <label for="impact">Impact de l'IA dans votre travail quotidien :</label>
                <textarea id="impact" rows="3" required placeholder="Comment cela va vous aider ?"></textarea>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="next_course">Quelle autre formation GOMYCODE vous intéresse ? *</label>
                <select id="next_course" required>
                    <option value="">-- Sélectionner un parcours --</option>
                    <option>Data Analytics - Microsoft Power BI Certified</option>
                    <option>Graphic Design - Adobe Certified</option>
                    <option>Data Scientist Bootcamp: NVIDIA Certified</option>
                    <option>Introduction to Social Media Marketing with AI skills</option>
                    <option>Digital Marketing Bootcamp with AI skills</option>
                    <option>Advanced Digital Marketing with AI skills - Meta Certified</option>
                    <option>Cyber Security Bootcamp: Certified CompTIA Security+ 701</option>
                    <option>Software Development Bootcamp with AI skills</option>
                    <option>Python Essentials</option>
                    <option>Generative AI for Professionals</option>
                    <option>Introduction to Microsoft Office</option>
                    <option>Introduction to Web Development with AI skills</option>
                </select>
            </div>
        </fieldset>

        <button type="submit" id="submitBtn">Envoyer mon Feedback</button>
    </form>

    <div class="footer">
        © 2026 SENELEC x GOMYCODE - CFPP MBAO
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWhsvPkRgc0NS90tDnzW5Z33RzGxkiucHC7cDEUEqZJDdkrzx5ftkj4CSHpsIHMjy4Ow/exec";

    const generateNPS = (containerId) => {
        const container = document.getElementById(containerId);
        for(let i=0; i<=10; i++) {
            container.innerHTML += `
                <div class="nps-item">
                    <input type="radio" name="${containerId}" id="${containerId}_${i}" value="${i}" ${i===10?'checked':''}>
                    <label for="${containerId}_${i}">${i}</label>
                </div>`;
        }
    };
    generateNPS('nps_cours');
    generateNPS('nps_formateur');

    document.getElementById('feedbackSenelec').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        const payload = {
            nom: document.getElementById('nom').value,
            direction: document.getElementById('direction').value,
            nps_cours: document.querySelector('input[name="nps_cours"]:checked').value,
            nps_formateur: document.querySelector('input[name="nps_formateur"]:checked').value,
            impact: document.getElementById('impact').value,
            interet: document.getElementById('next_course').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            document.querySelector('.container').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: var(--senelec-blue);">Merci !</h2>
                    <p>Votre feedback a été enregistré. Bonne continuation avec Copilot !</p>
                </div>`;
        })
        .catch(() => {
            alert("Erreur. Veuillez réessayer.");
            btn.disabled = false;
        });
    };
</script>

</body>
</html>
